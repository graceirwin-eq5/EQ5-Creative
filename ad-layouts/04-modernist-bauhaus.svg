<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
<title>Ad layout 04 — Modernist, Bauhaus grid</title>
<desc>1080x1080 ad mockup. Mint green background with subtle grid pattern, red square accent top-right, black camera-lens product hero with cobalt iris, bold sans headline, square-cornered black CTA, yellow triangle accent.</desc>

<defs>
  <pattern id="mintgrid" patternUnits="userSpaceOnUse" width="108" height="108">
    <path d="M 108 0 L 0 0 0 108" fill="none" stroke="#173404" stroke-width="2" opacity="0.3"/>
  </pattern>
</defs>

<rect width="1080" height="1080" fill="#C0DD97"/>
<rect width="1080" height="1080" fill="url(#mintgrid)"/>

<!-- accent shapes -->
<rect x="940" y="80" width="100" height="100" fill="#E24B4A"/>
<polygon points="1040,940 1040,1040 940,1040" fill="#FAC775"/>
<circle cx="100" cy="990" r="18" fill="#1A1A1A"/>

<!-- LOGO -->
<rect x="80" y="100" width="32" height="32" fill="#173404"/>
<text x="130" y="128" font-family="sans-serif" font-size="38" font-weight="700" fill="#173404" letter-spacing="6">FORM·LAB</text>

<!-- PRODUCT (camera lens) -->
<circle cx="800" cy="500" r="190" fill="#1A1A1A"/>
<circle cx="800" cy="500" r="146" fill="#3C3489"/>
<circle cx="800" cy="500" r="100" fill="#1A1A1A"/>
<circle cx="800" cy="500" r="60" fill="#FAEEDA"/>
<circle cx="775" cy="475" r="14" fill="#FFFFFF" opacity="0.65"/>

<!-- HEADLINE -->
<text x="80" y="500" font-family="sans-serif" font-size="86" font-weight="700" fill="#173404">Geometry,</text>
<text x="80" y="590" font-family="sans-serif" font-size="86" font-weight="700" fill="#1A1A1A">for living.</text>

<!-- BODY copy bars -->
<rect x="80" y="640" width="640" height="10" rx="5" fill="#173404" opacity="0.55"/>
<rect x="80" y="670" width="540" height="10" rx="5" fill="#173404" opacity="0.55"/>
<rect x="80" y="700" width="440" height="10" rx="5" fill="#173404" opacity="0.55"/>

<!-- CTA (square corners — modernist) -->
<rect x="80" y="800" width="440" height="110" fill="#1A1A1A"/>
<text x="300" y="868" font-family="sans-serif" font-size="36" font-weight="600" fill="#C0DD97" text-anchor="middle" letter-spacing="5">GET YOURS  →</text>
</svg>
