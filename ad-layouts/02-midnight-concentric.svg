<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
<title>Ad layout 02 — Midnight, concentric rings</title>
<desc>1080x1080 ad mockup. Dark background with amber concentric rings bleeding from top-right, halftone dot block lower-left, watch dial product hero, serif italic headline accent, outlined CTA.</desc>

<defs>
  <pattern id="dotpat" patternUnits="userSpaceOnUse" width="42" height="42">
    <circle cx="21" cy="21" r="4" fill="#FAC775"/>
  </pattern>
</defs>

<rect width="1080" height="1080" fill="#1A1A1A"/>

<!-- concentric rings top-right -->
<circle cx="940" cy="320" r="70" fill="none" stroke="#FAC775" stroke-width="2" opacity="0.55"/>
<circle cx="940" cy="320" r="130" fill="none" stroke="#FAC775" stroke-width="2" opacity="0.42"/>
<circle cx="940" cy="320" r="190" fill="none" stroke="#FAC775" stroke-width="2" opacity="0.32"/>
<circle cx="940" cy="320" r="250" fill="none" stroke="#FAC775" stroke-width="2" opacity="0.22"/>
<circle cx="940" cy="320" r="310" fill="none" stroke="#FAC775" stroke-width="2" opacity="0.14"/>

<!-- dot pattern lower-left -->
<rect x="80" y="800" width="300" height="160" fill="url(#dotpat)" opacity="0.7"/>

<!-- LOGO -->
<text x="80" y="140" font-family="serif" font-style="italic" font-size="50" font-weight="500" fill="#FAC775" letter-spacing="6">Aurora.</text>
<line x1="80" y1="170" x2="180" y2="170" stroke="#FAC775" stroke-width="2"/>

<!-- PRODUCT (watch dial) -->
<circle cx="500" cy="510" r="175" fill="#FAC775"/>
<circle cx="500" cy="510" r="155" fill="#1A1A1A"/>
<circle cx="500" cy="510" r="135" fill="#2C2C2A"/>
<circle cx="500" cy="510" r="128" fill="none" stroke="#FAC775" stroke-width="1.5" opacity="0.6"/>
<line x1="500" y1="395" x2="500" y2="415" stroke="#FAC775" stroke-width="4" stroke-linecap="round"/>
<line x1="615" y1="510" x2="595" y2="510" stroke="#FAC775" stroke-width="4" stroke-linecap="round"/>
<line x1="500" y1="625" x2="500" y2="605" stroke="#FAC775" stroke-width="4" stroke-linecap="round"/>
<line x1="385" y1="510" x2="405" y2="510" stroke="#FAC775" stroke-width="4" stroke-linecap="round"/>
<line x1="500" y1="510" x2="500" y2="438" stroke="#FAEEDA" stroke-width="6" stroke-linecap="round"/>
<line x1="500" y1="510" x2="556" y2="510" stroke="#FAC775" stroke-width="5" stroke-linecap="round"/>
<circle cx="500" cy="510" r="8" fill="#FAEEDA"/>

<!-- HEADLINE -->
<text x="80" y="780" font-family="sans-serif" font-size="62" font-weight="500" fill="#FAEEDA">Made for</text>
<text x="80" y="860" font-family="serif" font-style="italic" font-size="76" font-weight="500" fill="#FAC775">the night owls.</text>

<!-- BODY copy bars -->
<rect x="500" y="810" width="500" height="8" rx="4" fill="#FAEEDA" opacity="0.45"/>
<rect x="500" y="835" width="420" height="8" rx="4" fill="#FAEEDA" opacity="0.45"/>
<rect x="500" y="860" width="350" height="8" rx="4" fill="#FAEEDA" opacity="0.45"/>

<!-- CTA outlined -->
<rect x="80" y="930" width="380" height="80" rx="40" fill="none" stroke="#FAC775" stroke-width="2.5"/>
<text x="270" y="980" font-family="sans-serif" font-size="32" font-weight="500" fill="#FAC775" text-anchor="middle" letter-spacing="5">EXPLORE  →</text>
</svg>
